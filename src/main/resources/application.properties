spring.application.name=ullas-blomster-app

# URL must point to the POSTGRES_DB name below
spring.datasource.url=jdbc:postgresql://localhost:5432/ullas_blomster_db
# Credentials must match the Docker environment exactly
spring.datasource.username=blomster_user
spring.datasource.password=blomster_pass

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect